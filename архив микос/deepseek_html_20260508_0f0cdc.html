<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  <title>Театр клоунады «Микос» | Магазин мерча</title>
  <link rel="icon" type="image/svg+xml" href="SVG/logo-2.svg" sizes="any">
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/header-footer.css">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="js/emailjs-integration.js"></script>
  <style>
    :root {
      --color-bg: #F2F1F0;
      --color-text: #231F20;
      --color-accent: #E8454D;
      --color-border: rgba(35, 31, 32, 0.12);
      --font-display: 'Unbounded', sans-serif;
      --font-body: 'Nunito Sans', sans-serif;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
    }
    .shop-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #mainContent {
      flex: 1;
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem 3rem;
      width: 100%;
    }
    .page-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .title-accent h1 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 6vw, 2.8rem);
      letter-spacing: -0.02em;
      color: #2C4068;
    }
    .page-description {
      color: #5A5A5A;
      margin-top: 0.5rem;
      font-size: 1.1rem;
    }

    /* ФИЛЬТРЫ — точно как на странице "Носители и о бренде" */
    .filters-section {
      margin: 1.5rem 0 2rem;
    }
    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .filter-chip {
      padding: 0.5rem 1.25rem;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      border-radius: 30px;
      border: 2px solid var(--color-border);
      background: #fff;
      color: #5A5A5A;
      cursor: pointer;
      transition: 0.2s ease;
      white-space: nowrap;
    }
    .filter-chip:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }
    .filter-chip.active {
      background: var(--color-accent);
      border-color: var(--color-accent);
      color: #fff;
    }

    /* Сетка товаров */
    .merch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .product-card {
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
      border: 1px solid var(--color-border);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }
    .product-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(0,0,0,0.1);
    }
    .product-img {
      position: relative;
      overflow: hidden;
      background: #f0f0f0;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }
    .product-card:hover .product-img img {
      transform: scale(1.04);
    }
    .merch-photo-count {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }
    .product-card:hover .merch-photo-count,
    .product-card.force-visible .merch-photo-count {
      opacity: 1;
    }
    .product-info {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .product-name {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.2rem;
      margin-bottom: 0.3rem;
    }
    .product-desc {
      color: #5A5A5A;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      flex: 1;
    }
    .product-price {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #2C4068;
    }
    .buy-now-btn {
      background: var(--color-accent);
      color: white;
      border: none;
      padding: 0.7rem 1.2rem;
      border-radius: 30px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      align-self: flex-start;
      z-index: 3;
      position: relative;
    }
    .buy-now-btn:hover {
      background: #c9303a;
    }
    .show-more-wrapper {
      display: flex;
      justify-content: center;
      margin: 2.5rem 0;
    }
    .show-more-btn {
      padding: 0.7rem 2.5rem;
      font-family: var(--font-display);
      font-weight: 600;
      border: 2px solid var(--color-border);
      border-radius: 30px;
      background: #fff;
      cursor: pointer;
      transition: 0.2s;
    }
    .show-more-btn:hover {
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    /* Модальные окна */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal-container {
      background: #fff;
      border-radius: 24px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }
    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 1.8rem;
      cursor: pointer;
      color: #5A5A5A;
    }
    .modal-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.6rem;
      margin-bottom: 1.2rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .form-input, .form-select {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      font-family: var(--font-body);
    }
    .modal-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 1.8rem;
    }
    .modal-btn {
      padding: 0.8rem;
      border-radius: 30px;
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      border: none;
      text-align: center;
      transition: 0.2s;
    }
    .btn-primary-modal {
      background: var(--color-accent);
      color: white;
    }
    .btn-outline-modal {
      background: transparent;
      border: 2px solid var(--color-border);
      color: #231F20;
    }
    .btn-outline-modal:hover {
      border-color: var(--color-accent);
    }
    .cart-summary {
      background: #f9f9f9;
      border-radius: 16px;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }
    .cart-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eee;
      padding: 0.6rem 0;
    }
    .cart-item-name {
      font-weight: 600;
    }
    .cart-item-price {
      font-weight: 700;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      margin-top: 0.8rem;
    }
    .edit-item, .delete-item {
      background: none;
      border: none;
      cursor: pointer;
      margin-left: 8px;
    }

    /* Галерея */
    .product-gallery-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
    }
    .product-gallery-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .product-gallery-image {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
    }
    .gallery-close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      color: white;
      font-size: 2rem;
      background: none;
      border: none;
      cursor: pointer;
    }
    .gallery-nav-btn {
      position: absolute;
      top: 50%;
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 2rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .gallery-nav-btn.prev { left: 20px; }
    .gallery-nav-btn.next { right: 20px; }

    @media (max-width: 600px) {
      .filter-chips {
        gap: 0.5rem;
      }
      .filter-chip {
        padding: 0.4rem 1rem;
        font-size: 0.8rem;
      }
      .modal-container {
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>
<div class="shop-container" id="shopContainer">
  <div id="site-header"></div>
  <div class="overlay" id="overlay"></div>

  <div id="mainContent">
    <div class="page-header">
      <div class="title-accent"><h1 class="page-title">Магазин</h1></div>
      <p class="page-description">Сувениры, одежда и аксессуары с символикой театра.<br>Доставка по всей России.</p>
    </div>
    <div class="filters-section">
      <div class="filter-chips" id="filterChips">
        <div class="filter-chip active" data-filter="all">Все товары</div>
        <div class="filter-chip" data-filter="clothes">Одежда</div>
        <div class="filter-chip" data-filter="accessories">Аксессуары</div>
        <div class="filter-chip" data-filter="tableware">Посуда</div>
        <div class="filter-chip" data-filter="printed">Печатная продукция</div>
        <div class="filter-chip" data-filter="souvenirs">Сувениры</div>
      </div>
    </div>
    <div class="merch-grid" id="merchGrid"></div>
    <div class="show-more-wrapper">
      <button class="show-more-btn" id="showMoreBtn">Показать еще</button>
    </div>
  </div>
  <div id="site-footer"></div>
</div>

<!-- Галерея -->
<div class="product-gallery-overlay" id="productGallery">
  <button class="gallery-close-btn" id="galleryCloseBtn">&times;</button>
  <img class="product-gallery-image" id="galleryMainImage" src="" alt="Товар">
  <button class="gallery-nav-btn prev" id="galleryPrevBtn"><i class="fas fa-chevron-left"></i></button>
  <button class="gallery-nav-btn next" id="galleryNextBtn"><i class="fas fa-chevron-right"></i></button>
</div>

<!-- Модалка товара -->
<div id="modalProduct" class="modal-overlay">
  <div class="modal-container">
    <span class="modal-close" id="closeModal1">&times;</span>
    <div id="dynamicModalContent"></div>
    <div class="modal-buttons" id="modalButtonsContainer"></div>
  </div>
</div>

<!-- Модалка контактов -->
<div id="modalContacts" class="modal-overlay">
  <div class="modal-container">
    <span class="modal-close" id="closeModal2">&times;</span>
    <div class="modal-title">Оформление заказа</div>
    <div id="orderSummaryFull" class="cart-summary"></div>
    <div class="form-group"><label>Имя</label><input type="text" id="contactName" class="form-input" placeholder="Иван Иванов"></div>
    <div class="form-group"><label>Телефон</label><input type="tel" id="contactPhone" class="form-input" placeholder="+7 (___) ___-__-__"></div>
    <div class="form-group"><label>Email</label><input type="email" id="contactEmail" class="form-input" placeholder="mail@example.com"></div>
    <div class="form-group"><label>Способ связи</label><input type="text" id="contactMethod" class="form-input" placeholder="Telegram / WhatsApp / звонок"></div>
    <div class="modal-buttons">
      <button id="submitOrderBtn" class="modal-btn btn-primary-modal" style="width:100%;">Оформить заказ</button>
    </div>
  </div>
</div>

<script src="js/loader-animation.js"></script>
<script src="js/components-loader.js"></script>
<script src="js/header-scripts.js"></script>

<script>
(function() {
  const products = [
    { id: 1, name: 'Носки', desc: 'Принт с логотипом театра', price: 500, images: ['images/content/shop/2.png'], category: 'clothes' },
    { id: 2, name: 'Подвес на рюкзак "Микос Team"', desc: 'Современный аксессуар', price: 900, images: ['images/content/shop/3.png'], category: 'accessories' },
    { id: 3, name: 'Футболка', desc: 'Хлопковая футболка', price: 2500, isClothing: true, images: ['images/content/shop/5.png', 'images/content/shop/1.png'], category: 'clothes' },
    { id: 4, name: 'Футболка', desc: 'Хлопковая футболка', price: 2500, isClothing: true, images: ['images/content/shop/7.png', 'images/content/shop/5.png'], category: 'clothes' },
    { id: 5, name: 'Футболка', desc: 'Хлопковая футболка', price: 2500, isClothing: true, images: ['images/content/shop/8.png', 'images/content/shop/5.png'], category: 'clothes' },
    { id: 6, name: 'Сумка шоппер', desc: 'Эко-сумка', price: 1800, images: ['images/content/shop/9.png'], category: 'accessories' },
    { id: 7, name: 'Футболка', desc: 'Хлопковая футболка с логотипом', price: 2500, isClothing: true, images: ['images/content/shop/1.png', 'images/content/shop/5.png'], category: 'clothes' },
    { id: 8, name: 'Кружка театральная', desc: 'Фарфор', price: 1200, images: ['https://placehold.co/428x220/2A3D5E/white?text=Кружка'], category: 'tableware' },
    { id: 9, name: 'Магнит символ', desc: 'Сувенирный магнит', price: 450, images: ['https://placehold.co/428x220/4A6294/white?text=Магнит'], category: 'souvenirs' },
    { id: 10, name: 'Программа спектакля', desc: 'Иллюстрированная', price: 350, images: ['https://placehold.co/428x220/2A3D5E/white?text=Программа'], category: 'printed' }
  ];

  let cartItems = [], currentProduct = null, editingIndex = -1, returnToContacts = false;
  let activeFilter = 'all', currentIndex = 8;
  let galleryImages = [], currentGalleryIndex = 0;

  const productGallery = document.getElementById('productGallery');
  const galleryMainImage = document.getElementById('galleryMainImage');
  const galleryPrevBtn = document.getElementById('galleryPrevBtn');
  const galleryNextBtn = document.getElementById('galleryNextBtn');
  const galleryCloseBtn = document.getElementById('galleryCloseBtn');

  function openGallery(images) {
    if (!images || !images.length) return;
    galleryImages = images;
    currentGalleryIndex = 0;
    updateGalleryImage();
    productGallery.classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeGallery() {
    productGallery.classList.remove('active');
    document.body.style.overflow = '';
  }
  function updateGalleryImage() {
    if (galleryImages.length) galleryMainImage.src = galleryImages[currentGalleryIndex];
  }
  galleryPrevBtn?.addEventListener('click', (e) => { e.stopPropagation(); if(galleryImages.length>1) currentGalleryIndex = (currentGalleryIndex-1+galleryImages.length)%galleryImages.length; updateGalleryImage(); });
  galleryNextBtn?.addEventListener('click', (e) => { e.stopPropagation(); if(galleryImages.length>1) currentGalleryIndex = (currentGalleryIndex+1)%galleryImages.length; updateGalleryImage(); });
  galleryCloseBtn?.addEventListener('click', closeGallery);
  productGallery?.addEventListener('click', (e) => { if(e.target === productGallery) closeGallery(); });

  function renderProducts() {
    const grid = document.getElementById('merchGrid');
    const showMoreBtn = document.getElementById('showMoreBtn');
    if(!grid) return;
    const filtered = activeFilter === 'all' ? products : products.filter(p => p.category === activeFilter);
    const isLarge = window.innerWidth >= 1600;
    const display = filtered.slice(0, isLarge ? filtered.length : currentIndex);
    grid.innerHTML = '';
    if(!display.length) {
      grid.innerHTML = '<p style="text-align:center;grid-column:1/-1;">Товары не найдены</p>';
      if(showMoreBtn) showMoreBtn.style.display = 'none';
      return;
    }
    display.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      const mainImg = p.images?.[0] || 'https://placehold.co/428x220/ccc/white?text=Нет+фото';
      card.innerHTML = `
        <div class="product-img">
          <img src="${mainImg}" alt="${p.name}">
          ${p.images?.length>1 ? `<span class="merch-photo-count"><i class="fas fa-images"></i> ${p.images.length}</span>` : ''}
        </div>
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-desc">${p.desc}</div>
          <div class="product-price">${p.price.toLocaleString()} ₽</div>
          <button class="buy-now-btn" data-id="${p.id}">Купить</button>
        </div>
      `;
      card.addEventListener('click', (e) => {
        if(e.target.classList.contains('buy-now-btn')) return;
        if(p.images?.length) openGallery(p.images);
      });
      grid.appendChild(card);
    });
    document.querySelectorAll('.buy-now-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const prod = products.find(p => p.id === parseInt(btn.dataset.id));
        if(prod) openAddModal(prod);
      });
    });
    if(showMoreBtn) showMoreBtn.style.display = (isLarge || display.length >= filtered.length) ? 'none' : 'block';
  }

  function openAddModal(product) {
    currentProduct = product;
    editingIndex = -1;
    renderModalContent();
    document.getElementById('modalButtonsContainer').innerHTML = `
      <button id="moreItemsBtn" class="modal-btn btn-outline-modal">Хочу выбрать что-то еще</button>
      <button id="buyNowBtn" class="modal-btn btn-primary-modal">Купить</button>
    `;
    document.getElementById('modalProduct').classList.add('active');
    document.getElementById('moreItemsBtn').addEventListener('click', () => { if(addCurrentToCart()) closeModals(); });
    document.getElementById('buyNowBtn').addEventListener('click', () => { if(addCurrentToCart()) { closeModals(); openContacts(); } });
  }

  function renderModalContent() {
    const container = document.getElementById('dynamicModalContent');
    if(!container) return;
    let html = '';
    if(cartItems.length && editingIndex === -1) {
      html += `<div class="modal-title">Корзина</div><div class="cart-summary">`;
      cartItems.forEach((item, idx) => {
        html += `<div class="cart-item"><span>${item.name} ${item.size||''} x${item.quantity}</span><span>${(item.price*item.quantity).toLocaleString()} ₽</span></div>`;
      });
      html += `</div>`;
    }
    html += `<div class="modal-title">${currentProduct?.name || 'Товар'}</div>
      <div class="form-group"><label>Количество</label><input type="number" id="productQuantity" min="1" value="1" class="form-input"></div>`;
    if(currentProduct?.isClothing) {
      html += `<div class="form-group"><label>Размер</label><select id="productSize" class="form-select"><option>S</option><option selected>M</option><option>L</option><option>XL</option></select></div>`;
    }
    container.innerHTML = html;
  }

  function addCurrentToCart() {
    const qty = parseInt(document.getElementById('productQuantity')?.value || 1);
    if(qty < 1) { alert('Минимум 1'); return false; }
    let size = null;
    if(currentProduct.isClothing) size = document.getElementById('productSize')?.value;
    cartItems.push({ id: currentProduct.id, name: currentProduct.name, price: currentProduct.price, quantity: qty, size, isClothing: currentProduct.isClothing });
    renderModalContent();
    updateFullOrder();
    return true;
  }

  function updateFullOrder() {
    const container = document.getElementById('orderSummaryFull');
    if(!container) return;
    if(!cartItems.length) { container.innerHTML = '<p>Корзина пуста</p>'; return; }
    let html = '', total = 0;
    cartItems.forEach(item => { total += item.price*item.quantity; html += `<div class="cart-item"><span>${item.name} ${item.size||''} x${item.quantity}</span><span>${(item.price*item.quantity).toLocaleString()} ₽</span></div>`; });
    html += `<div class="total-row"><span>Итого</span><span>${total.toLocaleString()} ₽</span></div>`;
    container.innerHTML = html;
  }

  function closeModals() {
    document.getElementById('modalProduct')?.classList.remove('active');
    document.getElementById('modalContacts')?.classList.remove('active');
  }
  function openContacts() {
    if(!cartItems.length) { alert('Корзина пуста'); return; }
    updateFullOrder();
    document.getElementById('modalContacts').classList.add('active');
  }

  document.getElementById('submitOrderBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('contactName')?.value.trim();
    if(!name) { alert('Введите имя'); return; }
    try {
      await window.sendOrderMerch?.({ name, phone: document.getElementById('contactPhone')?.value, email: document.getElementById('contactEmail')?.value, contact_method: document.getElementById('contactMethod')?.value, order_summary: document.getElementById('orderSummaryFull')?.innerHTML });
      document.getElementById('modalContacts')?.classList.remove('active');
      alert(`Спасибо, ${name}! Заказ оформлен.`);
      cartItems = [];
    } catch(e) { alert('Ошибка отправки'); }
  });

  document.getElementById('showMoreBtn')?.addEventListener('click', () => { currentIndex += 4; renderProducts(); });
  document.querySelectorAll('.filter-chip').forEach(chip => {
    chip.addEventListener('click', function() {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      this.classList.add('active');
      activeFilter = this.dataset.filter;
      currentIndex = 8;
      renderProducts();
    });
  });
  document.getElementById('closeModal1')?.addEventListener('click', closeModals);
  document.getElementById('closeModal2')?.addEventListener('click', closeModals);
  window.addEventListener('resize', renderProducts);
  renderProducts();
})();
</script>
<script src="js/common.js"></script>
</body>
</html>
